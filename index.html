<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פנקס פתקים מודרני</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-main: #2d3748;
      --text-secondary: #718096;
      --primary: #4a90e2;
      --accent: #ff6b6b;
      --shadow: 0 10px 25px rgba(0,0,0,0.05);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    h1 { font-size: 28px; font-weight: 700; color: var(--text-main); }
    .btn-archive-view { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-archive-view:hover { background: var(--primary); color: white; }

    /* בר קטגוריות משודרג */
    .categories-bar { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px 0; margin-bottom: 20px; scrollbar-width: none; }
    .categories-bar::-webkit-scrollbar { display: none; }
    .cat-chip { background: white; padding: 8px 18px; border-radius: 25px; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 2px solid transparent; transition: all 0.2s; white-space: nowrap; user-select: none; position: relative; }
    .cat-chip.active { background: var(--primary); color: white; }
    .cat-chip:not(.active):hover { border-color: #e2e8f0; background: #edf2f7; }
    
    .notes-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media(min-width: 600px) { .notes-grid { grid-template-columns: 1fr 1fr; } }
    
    .note-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column; justify-content: space-between; border-right: 5px solid #cbd5e0; transition: transform 0.2s, box-shadow 0.2s; }
    .note-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
    .note-card.urgent { border-right-color: var(--accent); }
    
    .note-text { font-size: 16px; line-height: 1.6; color: var(--text-main); margin-bottom: 15px; white-space: pre-wrap; word-break: break-word; }
    .note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .note-meta { font-size: 12px; color: var(--text-secondary); }
    .note-actions { display: flex; gap: 10px; }
    .action-btn { background: none; border: none; font-size: 16px; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 1; }
    
    /* כפתור פלוס צף */
    .fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(74,144,226,0.3); transition: all 0.2s; z-index: 99; }
    .fab:hover { transform: scale(1.05) rotate(90deg); }
    
    /* מודאלים פשוטים ונקיים */
    .modal { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: var(--radius); box-shadow: 0 20px 40px rgba(0,0,0,0.15); animation: scaleUp 0.2s ease; }
    
    @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    textarea, select, input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s; }
    textarea:focus, select:focus, input[type="text"]:focus { border-color: var(--primary); }
    
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .btn { padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 15px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #edf2f7; color: var(--text-main); }
    
    .empty-state { text-align: center; color: var(--text-secondary); padding: 50px 20px; font-size: 18px; grid-column: 1 / -1; }
    .loading { text-align: center; font-size: 18px; color: var(--primary); font-weight: 600; margin-top: 50px; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 id="app-title">פנקס פתקים</h1>
      <button class="btn-archive-view" id="view-toggle-btn" onclick="toggleViewMode()">הצג ארכיון</button>
    </header>

    <div class="categories-bar" id="categories-container"></div>

    <div id="loading-indicator" class="loading">טוען פתקים מהענן...</div>
    <div class="notes-grid" id="notes-container" style="display:none;"></div>
  </div>

  <button class="fab" onclick="openAddModal()">+</button>

  <div class="modal" id="note-modal">
    <div class="modal-content">
      <h3 id="modal-title" style="margin-bottom: 15px;">פתק חדש</h3>
      <input type="hidden" id="note-id">
      
      <div class="form-group">
        <label>תוכן הפתק</label>
        <textarea id="note-text-input" rows="5" placeholder="כתוב משהו..."></textarea>
      </div>
      
      <div class="form-group">
        <label>קטגוריה</label>
        <div style="display:flex; gap:10px;">
          <select id="note-category-select" style="flex: 1;"></select>
          <button class="btn btn-secondary" onclick="openNewCategoryPrompt()" type="button">+</button>
        </div>
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeNoteModal()">ביטול</button>
        <button class="btn btn-primary" onclick="saveNote()">שמור פתק</button>
      </div>
    </div>
  </div>

  <script>
    // קישור ה-Apps Script המעודכן שלך
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycybPDoqiVrsEe10L4zdaxgGMZkGCTgo9du7ahskvsX5QhnPHrTaWLNbfYjCKzDXEiTHW/exec";
    
    let allNotes = [];
    let categories = ["הכל"];
    let currentCategory = "הכל";
    let isArchiveView = false;

    // אתחול האפליקציה
    window.addEventListener('DOMContentLoaded', () => {
      loadInitialData();
    });

    async function loadInitialData() {
      showLoading(true);
      try {
        // טעינת כותרת האפליקציה
        const titleResponse = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getAppTitle' }) });
        const title = await titleResponse.json();
        if(title) document.getElementById('app-title').innerText = title;

        // טעינת קטגוריות ופתקים במקביל
        await refreshCategories();
        await refreshNotes();
      } catch(err) {
        console.error("שגיאה בטעינת נתונים ראשונית:", err);
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show) {
      document.getElementById('loading-indicator').style.display = show ? 'block' : 'none';
      document.getElementById('notes-container').style.display = show ? 'none' : 'grid';
    }

    // רענון ומשיכת קטגוריות מהגיליון
    async function refreshCategories() {
      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getCategories' }) });
        const serverCats = await response.json();
        categories = ["הכל", ...serverCats];
        renderCategoriesBar();
        populateCategorySelect();
      } catch(e) {
        console.error("שגיאה בטעינת קטגוריות:", e);
      }
    }

    // רענון ומשיכת פתקים
    async function refreshNotes() {
      const action = isArchiveView ? 'getArchivedNotes' : 'getNotes';
      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: action }) });
        allNotes = await response.json();
        renderNotes();
      } catch(e) {
        console.error("שגיאה בטעינת פתקים:", e);
        document.getElementById('notes-container').innerHTML = '<div class="empty-state">תקלת תקשורת עם השרת.</div>';
      }
    }

    // בניית בר הקטגוריות עם תמיכה במחיקה
    function renderCategoriesBar() {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';
      
      categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = `cat-chip ${currentCategory === cat ? 'active' : ''}`;
        chip.innerText = cat;
        
        // סינון רגיל בלחיצה
        chip.onclick = () => {
          currentCategory = cat;
          renderCategoriesBar();
          renderNotes();
        };

        // מחיקת קטגוריה בלחיצה ארוכה (או קליק ימני) - חסום עבור "הכל" ו-"כללי"
        if (cat !== "הכל" && cat !== "כללי") {
          chip.oncontextmenu = (e) => { e.preventDefault(); promptDeleteCategory(cat); };
          
          // תמיכה בלחיצה ארוכה בניידים
          let pressTimer;
          chip.addEventListener('touchstart', () => { pressTimer = setTimeout(() => promptDeleteCategory(cat), 800); });
          chip.addEventListener('touchend', () => { clearTimeout(pressTimer); });
        }
        
        container.appendChild(chip);
      });
    }

    // הצגת שאלת מחיקת קטגוריה
    async function promptDeleteCategory(catName) {
      if(confirm(`האם אתה בטוח שברצונך למחוק את הקטגוריה "${catName}"?\nכל הפתקים המשויכים אליה יועברו אוטומטית לקטגוריה "כללי".`)) {
        showLoading(true);
        try {
          const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteCategory', name: catName }) });
          const success = await response.json();
          if(success) {
            if(currentCategory === catName) currentCategory = "הכל";
            await refreshCategories();
            await refreshNotes();
          } else {
            alert("המחיקה נכשלה בשרת.");
          }
        } catch(e) {
          alert("שגיאת תקשורת במחיקת קטגוריה.");
        } finally {
          showLoading(false);
        }
      }
    }

    function populateCategorySelect() {
      const select = document.getElementById('note-category-select');
      select.innerHTML = '';
      // מציג בתיבת הבחירה רק קטגוריות אמיתיות (ללא "הכל")
      categories.filter(c => c !== "הכל").forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = cat;
        select.appendChild(opt);
      });
    }

    // הוספת קטגוריה חדשה בלייב מהאתר
    async function openNewCategoryPrompt() {
      const newCat = prompt("הכנס שם לקטגוריה החדשה:");
      if(newCat && newCat.trim() !== "") {
        showLoading(true);
        try {
          const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addCategory', name: newCat.trim() }) });
          const res = await response.json();
          if(res) {
            await refreshCategories();
            document.getElementById('note-category-select').value = newCat.trim();
          }
        } catch(e) {
          alert("שגיאה בהוספת קטגוריה");
        } finally {
          showLoading(false);
        }
      }
    }

    // רינדור הפתקים על המסך לפי הסינון הנבחר
    function renderNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '';
      
      const filtered = currentCategory === "הכל" 
        ? allNotes 
        : allNotes.filter(n => n[3] === currentCategory);
        
      if(filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">אין פתקים להצגה בקטגוריה זו</div>';
        return;
      }
      
      filtered.forEach(note => {
        const [id, text, date, cat, urgent] = note;
        const isUrgent = urgent === "דחוף";
        
        const card = document.createElement('div');
        card.className = `note-card ${isUrgent ? 'urgent' : ''}`;
        
        card.innerHTML = `
          <div class="note-text">${escapeHtml(text)}</div>
          <div class="note-footer">
            <div class="note-meta">
              <div>${date}</div>
              <div style="font-weight:600; color:var(--primary); margin-top:3px;">${cat || 'כללי'}</div>
            </div>
            <div class="note-actions">
              <button class="action-btn" onclick="toggleUrgentOnServer('${id}')" title="דחוף/רגיל">${isUrgent ? '⭐' : '☆'}</button>
              <button class="action-btn" onclick="openEditModal('${id}', \`${escapeRowText(text)}\`, '${cat}')" title="עריכה">✏️</button>
              <button class="action-btn" onclick="toggleArchiveOnServer('${id}')" title="${isArchiveView ? 'שחזור' : 'ארכיון'}">${isArchiveView ? '📤' : '📥'}</button>
              <button class="action-btn" onclick="deleteNoteOnServer('${id}')" title="מחיקה לצמיתות">🗑️</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // הפעלת פונקציות פתקים מול השרת
    async function toggleUrgentOnServer(id) {
      showLoading(true);
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleUrgent', id: id }) });
      await refreshNotes();
      showLoading(false);
    }

    async function toggleArchiveOnServer(id) {
      showLoading(true);
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleArchive', id: id }) });
      await refreshNotes();
      showLoading(false);
    }

    async function deleteNoteOnServer(id) {
      if(confirm("למחוק פתק זה לצמיתות מהענן?")) {
        showLoading(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteNoteFromSheet', id: id }) });
        await refreshNotes();
        showLoading(false);
      }
    }

    // ניהול המודאל
    function openAddModal() {
      document.getElementById('modal-title').innerText = "פתק חדש";
      document.getElementById('note-id').value = "";
      document.getElementById('note-text-input').value = "";
      if(currentCategory !== "הכל") document.getElementById('note-category-select').value = currentCategory;
      document.getElementById('note-modal').classList.add('open');
    }

    function openEditModal(id, text, cat) {
      document.getElementById('modal-title').innerText = "עריכת פתק";
      document.getElementById('note-id').value = id;
      document.getElementById('note-text-input').value = text;
      document.getElementById('note-category-select').value = cat || "כללי";
      document.getElementById('note-modal').classList.add('open');
    }

    function closeNoteModal() {
      document.getElementById('note-modal').classList.remove('open');
    }

    async function saveNote() {
      const id = document.getElementById('note-id').value;
      const text = document.getElementById('note-text-input').value;
      const category = document.getElementById('note-category-select').value;
      
      if(!text.trim()) return alert("לא ניתן לשמור פתק ריק");
      
      closeNoteModal();
      showLoading(true);
      
      const action = id ? 'updateNoteInSheet' : 'addNoteToSheet';
      const payload = { action: action, text: text, category: category };
      if(id) payload.id = id;
      
      try {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        await refreshNotes();
      } catch(e) {
        alert("שגיאה בשמירת הפתק");
      } finally {
        showLoading(false);
      }
    }

    function toggleViewMode() {
      isArchiveView = !isArchiveView;
      document.getElementById('view-toggle-btn').innerText = isArchiveView ? "הצג פתקים פעילים" : "הצג ארכיון";
      document.getElementById('view-toggle-btn').style.borderColor = isArchiveView ? "#ff6b6b" : "#4a90e2";
      showLoading(true);
      refreshNotes().then(() => showLoading(false));
    }

    // פונקציות עזר לניקוי תווים ומניעת שגיאות הזרקה
    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    function escapeRowText(text) {
      return text.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }
  </script>
</body>
</html>
